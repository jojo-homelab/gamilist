apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gamilist
  namespace: {{ .Values.namespace }}
  annotations:
    # Increase the max upload size for cover image uploads (default is 1MB).
    # Adjust this value in values.yaml via ingress.maxBodySize.
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.maxBodySize | quote }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.port }}
